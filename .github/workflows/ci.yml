name: CI

on:
  workflow_dispatch:
  push:
    paths-ignore:
      - 'README.md'
      - 'CHANGES.md'
      - 'CLAUDE.md'
      - 'LICENSE'
      - 'THANKS'
      - '.github/workflows/claude.yml'
      - '.github/copilot-instructions.md'
      - 'sora-android-sdk/packages.md'
      - 'docs/**'
      - 'jitpack.yml'
      - 'canary.py'
      - '.gitignore'

permissions:
  actions: read

jobs:
  e2e:
    runs-on: [self-hosted, macOS, ARM64, Apple-M1]
    timeout-minutes: 45
    env:
      SORA_SIGNALING_URL: ${{ secrets.TEST_SIGNALING_URL }}
      TEST_SECRET_KEY: ${{ secrets.TEST_SECRET_KEY }}
      TEST_CHANNEL_ID_PREFIX: ${{ secrets.TEST_CHANNEL_ID_PREFIX }}
      TEST_CHANNEL_ID_SUFFIX: _${{ github.run_id }}
      ANDROID_SDK_ROOT: /opt/android-sdk
      ADB_PATH: /opt/android-sdk/platform-tools/adb

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Set up JDK
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          # macOS arm64 の self-hosted runner でも利用可能な配布元を明示する。
          # runner ローカルの JDK 状態に依存せず、CI では常に JDK 17 を再現する。
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'
      - name: Validate Android SDK
        run: |
          test -n "${ANDROID_SDK_ROOT:-}" || { echo "ANDROID_SDK_ROOT is not set"; exit 1; }
          test -x "$ADB_PATH" || { echo "adb not found at $ADB_PATH"; exit 1; }
          test -x "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager" || {
            echo "sdkmanager not found at $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager"
            exit 1
          }
      - name: Copy gradle.properties
        run: cp gradle.properties.example gradle.properties
      - name: Validate E2E environment
        run: |
          test -n "${SORA_SIGNALING_URL:-}" || { echo "SORA_SIGNALING_URL is not set"; exit 1; }
      - name: Run E2E tests with logcat
        run: |
          set +e

          cleanup() {
            if [ -n "${LOGCAT_PID:-}" ]; then
              kill "$LOGCAT_PID" || true
              wait "$LOGCAT_PID" 2>/dev/null || true
            fi
            cat sora-e2e-logcat.txt || true
          }
          trap cleanup EXIT

          "$ADB_PATH" logcat -v time SoraE2ETest:D *:S > sora-e2e-logcat.txt 2>&1 &
          LOGCAT_PID=$!

          ./gradlew :sora-android-sdk:pixelApi35AndroidE2ETest --stacktrace
          exit $?
  slack_notify:
    needs: [e2e]
    runs-on: ubuntu-slim
    if: always()
    steps:
      - name: Slack Notification
        uses: shiguredo/github-actions/.github/actions/slack-notify@main
        with:
          status: ${{ needs.e2e.result }}
          slack_webhook: ${{ secrets.SLACK_WEBHOOK }}
          slack_channel: sora-android-sdk
        env:
          GH_TOKEN: ${{ github.token }}
