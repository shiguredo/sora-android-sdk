name: Build

on:
  workflow_dispatch:
  push:
    paths-ignore:
      - 'README.md'
      - 'CHANGES.md'
      - 'CLAUDE.md'
      - 'LICENSE'
      - 'THANKS'
      - '.github/workflows/claude.yml'
      - '.github/copilot-instructions.md'
      - 'sora-android-sdk/packages.md'
      - 'docs/**'
      - 'jitpack.yml'
      - 'canary.py'
      - '.gitignore'

permissions:
  actions: read

jobs:
  build:

    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Set up JDK
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: 'temurin'
          # java-version を 17 にしている理由は以下です
          # - Android Gradle plugin 8.5 のデフォルト JDK version が 17
          # - 17 は LTS であり、temurin では 2027年10月までサポート予定
          java-version: '17'
          cache: 'gradle'
      - name: Copy gradle.properties
        run: cp gradle.properties.example gradle.properties
      - name: Build with Gradle
        run: ./gradlew build
      - name: Lint Check
        run: ./gradlew ktlintCheck

  slack_notify:
    needs: [build]
    runs-on: ubuntu-slim
    if: always()
    steps:
      - name: Slack Notification
        uses: shiguredo/github-actions/.github/actions/slack-notify@main
        with:
          status: ${{ job.status }}
          slack_webhook: ${{ secrets.SLACK_WEBHOOK }}
          slack_channel: sora-android-sdk
        env:
          GH_TOKEN: ${{ github.token }}
